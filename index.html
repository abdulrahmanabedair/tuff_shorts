```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuff Shorts</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

.feed{
height:100vh;
overflow:hidden;
position:relative;
}

.card{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
transition:transform .4s;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,.8));
}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:15px;
}

.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
opacity:0;
}

.show{
animation:like .6s;
}

@keyframes like{
0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}

.topbar{
position:absolute;
top:0;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:15px;
z-index:10;
}
</style>
</head>

<body>

<div class="topbar text-white">
<h1 class="text-xl font-bold">TUFF SHORTS</h1>

<div class="flex gap-4">
<button onclick="upload()">➕</button>
<button onclick="profile()">👤</button>
</div>
</div>

<div id="feed" class="feed"></div>

<input type="file" id="videoInput" accept="video/*" hidden>

<script>

const storage={
get:(k,d)=>JSON.parse(localStorage.getItem(k))||d,
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let shorts=storage.get("shorts",[{
id:1,
name:"Demo User",
creator:"@demo",
desc:"Welcome to Tuff Shorts 🔥",
emoji:"🔥",
likes:0,
comments:[]
}])

let user=storage.get("user",null)

let index=0
let lastTap=0

function build(post,i){

const card=document.createElement("div")
card.className="card"
card.style.transform=`translateY(${i*100}%)`

card.innerHTML=`
${post.video ?
`<video src="${post.video}" autoplay loop muted></video>`
:
`<div class="flex items-center justify-center h-full text-8xl">${post.emoji}</div>`
}

<div class="overlay text-white">

<b>${post.name}</b><br>
<span class="text-sm">${post.creator}</span>

<p class="mt-2">${post.desc}</p>

</div>

<div class="actions text-white">

<button onclick="like(${post.id})">
❤️ ${post.likes}
</button>

<button onclick="comment(${post.id})">
💬 ${post.comments.length}
</button>

</div>

<div class="heart">❤️</div>
`

card.onclick=()=>{

let now=Date.now()

if(now-lastTap<300){
like(post.id)
showHeart(card)
}

lastTap=now

}

return card
}

function showHeart(card){

const h=card.querySelector(".heart")
h.classList.add("show")

setTimeout(()=>{
h.classList.remove("show")
},600)

}

function render(){

const feed=document.getElementById("feed")
feed.innerHTML=""

shorts.forEach((p,i)=>{
feed.appendChild(build(p,i))
})

}

render()

function swipe(dir){

index+=dir

if(index<0) index=0
if(index>=shorts.length) index=shorts.length-1

document.querySelectorAll(".card").forEach((c,i)=>{

c.style.transform=`translateY(${(i-index)*100}%)`

})

}

document.addEventListener("wheel",e=>{
swipe(e.deltaY>0?1:-1)
})

let startY

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY

if(startY-endY>50) swipe(1)
if(endY-startY>50) swipe(-1)

})

function like(id){

const post=shorts.find(p=>p.id==id)

post.likes++

storage.set("shorts",shorts)

render()

}

function comment(id){

let text=prompt("Comment")

if(!text) return

const post=shorts.find(p=>p.id==id)

post.comments.push({
user:user?user.name:"anon",
text
})

storage.set("shorts",shorts)

render()

}

function profile(){

if(!user){

let name=prompt("Choose username")

if(!name) return

user={name}

storage.set("user",user)

alert("Logged in!")

}else{

if(confirm("Logout?")){
user=null
storage.set("user",null)
}

}

}

function upload(){

if(!user){
alert("Login first")
return
}

document.getElementById("videoInput").click()

}

videoInput.onchange=e=>{

let file=e.target.files[0]

if(!file) return

let url=URL.createObjectURL(file)

let desc=prompt("Video description")||"New video"

shorts.unshift({
id:Date.now(),
name:user.name,
creator:user.name,
desc,
video:url,
likes:0,
comments:[]
})

storage.set("shorts",shorts)

render()

}

</script>

</body>
</html>
```
