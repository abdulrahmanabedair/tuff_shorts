<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuff Shorts</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:sans-serif;
overflow:hidden;
color:white;
}

/* CENTER CONTAINER LIKE YOUTUBE SHORTS */

.app{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* SHORTS FRAME */

.frame{
position:relative;
width:360px;
height:640px;
background:black;
overflow:hidden;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* FULLSCREEN ON PHONE */

@media (max-width:600px){

.frame{
width:100%;
height:100vh;
border-radius:0;
}

}

/* FEED */

.feed{
position:relative;
height:100%;
width:100%;
overflow:hidden;
}

/* CARD */

.card{
position:absolute;
width:100%;
height:100%;
transition:transform .4s;
}

/* VIDEO */

video{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT OVERLAY */

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:16px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
}

/* ACTION BUTTONS */

.actions{
position:absolute;
right:12px;
bottom:120px;
display:flex;
flex-direction:column;
gap:16px;
text-align:center;
}

.actions button{
font-size:22px;
}

/* LIKE HEART */

.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
opacity:0;
}

.show{
animation:like .6s;
}

@keyframes like{
0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* TOP BAR */

.topbar{
position:absolute;
top:0;
left:0;
right:0;
padding:12px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

<div class="frame">

<div class="topbar">
<span>TUFF SHORTS</span>

<div>
<button onclick="upload()">➕</button>
<button onclick="profile()">👤</button>
</div>
</div>

<div id="feed" class="feed"></div>

</div>

</div>

<input type="file" id="videoInput" hidden accept="video/*">

<script>

const storage={
get:(k,d)=>JSON.parse(localStorage.getItem(k))||d,
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let shorts=storage.get("shorts",[{
id:1,
name:"Demo",
creator:"@demo",
desc:"Welcome to Tuff Shorts 🔥",
emoji:"🔥",
likes:0,
comments:[]
}])

let user=storage.get("user",null)

let index=0
let lastTap=0

function build(post,i){

const card=document.createElement("div")

card.className="card"
card.style.transform=`translateY(${i*100}%)`

card.innerHTML=`

${post.video
? `<video src="${post.video}" autoplay muted loop></video>`
: `<div class="flex items-center justify-center h-full text-8xl">${post.emoji}</div>`
}

<div class="overlay">

<b>${post.name}</b><br>
<span class="text-sm">${post.creator}</span>

<p class="text-sm mt-1">${post.desc}</p>

</div>

<div class="actions">

<button onclick="like(${post.id})">❤️<br>${post.likes}</button>

<button onclick="comment(${post.id})">💬<br>${post.comments.length}</button>

</div>

<div class="heart">❤️</div>

`

card.onclick=()=>{

let now=Date.now()

if(now-lastTap<300){

like(post.id)
showHeart(card)

}

lastTap=now

}

return card

}

function showHeart(card){

const heart=card.querySelector(".heart")

heart.classList.add("show")

setTimeout(()=>{
heart.classList.remove("show")
},600)

}

function render(){

const feed=document.getElementById("feed")

feed.innerHTML=""

shorts.forEach((p,i)=>{
feed.appendChild(build(p,i))
})

}

render()

function swipe(dir){

index+=dir

if(index<0) index=0
if(index>=shorts.length) index=shorts.length-1

document.querySelectorAll(".card").forEach((c,i)=>{

c.style.transform=`translateY(${(i-index)*100}%)`

})

}

document.addEventListener("wheel",e=>{
swipe(e.deltaY>0?1:-1)
})

let startY

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let end=e.changedTouches[0].clientY

if(startY-end>50) swipe(1)
if(end-startY>50) swipe(-1)

})

function like(id){

const p=shorts.find(x=>x.id==id)

p.likes++

storage.set("shorts",shorts)

render()

}

function comment(id){

let text=prompt("Comment")

if(!text) return

const p=shorts.find(x=>x.id==id)

p.comments.push({text})

storage.set("shorts",shorts)

render()

}

function profile(){

if(!user){

let name=prompt("Username")

if(!name) return

user={name}

storage.set("user",user)

alert("Logged in")

}else{

if(confirm("Logout?")){
user=null
storage.set("user",null)
}

}

}

function upload(){

if(!user){
alert("Login first")
return
}

videoInput.click()

}

videoInput.onchange=e=>{

let file=e.target.files[0]

if(!file) return

let url=URL.createObjectURL(file)

let desc=prompt("Video description")||"New post"

shorts.unshift({
id:Date.now(),
name:user.name,
creator:user.name,
desc,
video:url,
likes:0,
comments:[]
})

storage.set("shorts",shorts)

render()

}

</script>

</body>
</html>
